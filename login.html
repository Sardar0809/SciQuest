<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — SciQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<style>
body{background:linear-gradient(160deg,var(--forest) 0%,var(--leaf) 55%,var(--moss) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.auth-wrap{width:100%;max-width:460px;}
.auth-card{background:white;border-radius:var(--r-xl);padding:2.5rem;box-shadow:var(--sh-xl);}
.auth-logo{text-align:center;margin-bottom:2rem;}
.auth-logo .al-name{font-family:var(--font-display);font-size:2rem;color:var(--leaf);}
.auth-logo .al-name span{color:var(--fern);font-style:italic;}
.auth-logo p{font-size:14px;color:var(--smoke);margin-top:5px;}
.show-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--smoke);font-size:.9rem;padding:4px;}
.pw-wrap{position:relative;}
.pw-wrap .fi{padding-right:40px;}
.forgot{font-size:13px;color:var(--moss);float:right;margin-top:-1.1rem;margin-bottom:.8rem;}
.forgot:hover{text-decoration:underline;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:1.2rem 0;color:var(--silver);font-size:13px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;border-top:1px solid var(--bd);}
.reg-link{text-align:center;margin-top:1.2rem;font-size:14px;color:var(--smoke);}
.reg-link a{color:var(--moss);font-weight:700;}
.back-home{display:block;text-align:center;margin-top:1.5rem;font-size:13px;color:rgba(255,255,255,.6);transition:color .2s;}
.back-home:hover{color:var(--sage);}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r-sm);padding:.7rem 1rem;font-size:13px;color:#991b1b;margin-bottom:1rem;display:none;}
</style>
</head>
<body>
<div id="particles"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="al-name">Sci<span>Quest</span></div>
      <p>Sign in to your account</p>
    </div>

    <div class="err-box" id="errBox"></div>

    <div class="fg">
      <label>Email Address</label>
      <input type="email" class="fi" id="loginEmail" placeholder="Enter your university email" autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <div class="fg">
      <label>Password</label>
      <div class="pw-wrap" style="position:relative;">
        <input type="password" class="fi" id="loginPw" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="show-pw" type="button" onclick="togglePw()" id="pwToggle">👁</button>
      </div>
    </div>
    <a href="forgot-password.html" class="forgot">Forgot password?</a>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.3rem;">
      <input type="checkbox" id="rememberMe" style="accent-color:var(--moss);width:15px;height:15px;">
      <label for="rememberMe" style="font-size:13px;cursor:pointer;color:var(--steel);">Keep me signed in for 30 days</label>
    </div>

    <button class="btn btn-primary btn-w" style="padding:13px;font-size:15px;" onclick="doLogin()" id="loginBtn">Sign In →</button>

    <div class="reg-link">Don't have an account? <a href="register.html">Create one free</a></div>
  </div>
  <a href="index.html" class="back-home">← Back to SciQuest</a>
</div>

<script src="js/app.js"></script>
<script>
function togglePw(){
  const inp=document.getElementById('loginPw');
  const btn=document.getElementById('pwToggle');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁';}
}

function showErr(msg){ const b=document.getElementById('errBox'); b.textContent=msg; b.style.display='block'; }
function hideErr()   { document.getElementById('errBox').style.display='none'; }

function doLogin() {
  hideErr();
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pw    = document.getElementById('loginPw').value;

  if (!email) { showErr('Please enter your email address.'); return; }
  if (!email.includes('@')) { showErr('Please enter a valid email address.'); return; }
  if (!pw) { showErr('Please enter your password.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  setTimeout(() => {
    // Check admin
    if (email === 'saeedullahbacha048@gmail.com') {
      const adminUser = {
        name: 'Saeed Ullah',
        initials: 'SU',
        email: 'saeedullahbacha048@gmail.com',
        role: 'admin',
        color: '#1a4a2e',
        university: 'University of Agriculture,Peshawer',
        degree: 'MPhil',
        field: 'Parasitology',
        verified: true,
        walletBalance: 0,
        tasksCompleted: 0,
        tasksPosted: 0,
        weeklyPoints: 0,
        rating: 5.0,
        joinedAt: Date.now(),
        isFounder: true,
      };
      DB.setUser(adminUser);
      toast('Welcome back, Saeed Ullah! (Admin)');
      setTimeout(()=>location.href='admin.html', 800);
      return;
    }

    // Check existing registered user
    const stored = DB.getUser();
    if (stored && stored.email && stored.email.toLowerCase() === email) {
      toast(`Welcome back, ${stored.name.split(' ')[0]}!`);
      DB.addNotif({type:'system',icon:'🔐',bg:'#f0fdf4',title:'Signed in successfully',body:'You signed in from a new session.'});
      setTimeout(()=>location.href='dashboard.html', 700);
      return;
    }

    // No account found
    showErr('No account found with this email. Please register first, or check your email address.');
    btn.disabled = false;
    btn.textContent = 'Sign In →';
  }, 1200);
}

// Redirect if already logged in
document.addEventListener('DOMContentLoaded',()=>{
  const user=DB.getUser();
  if(user){ location.href = user.role==='admin'?'admin.html':'dashboard.html'; }
});
</script>
</body>
</html>
