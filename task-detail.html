<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Detail — SciQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/app.css">
<style>
.task-detail-body{max-width:1040px;margin:2rem auto;padding:0 1.5rem 4rem;display:grid;grid-template-columns:1fr 320px;gap:2rem;}
.task-main-card{background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;}
.task-req-list{padding-left:1.2rem;display:flex;flex-direction:column;gap:.5rem;}
.task-req-list li{font-size:14px;color:#444;line-height:1.6;}
.applicant-card{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.6rem;transition:all .2s;cursor:pointer;}
.applicant-card:hover{border-color:var(--fern);background:var(--sand);}
.applicant-card .stars{font-size:12px;color:#f59e0b;}
@media(max-width:780px){.task-detail-body{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">Sci<span>Quest</span></a>
    <div class="nav-center">
      <a href="browse.html" class="nav-link">Browse Tasks</a>
      <a href="leaderboard.html" class="nav-link">Leaderboard</a>
    </div>
    <div class="nav-right" id="navRight">
      <a href="login.html" class="btn-ghost">Sign In</a>
      <a href="register.html" class="btn-nav-cta">Join Free</a>
      <button class="hamburger" id="hamburger">&#9776;</button>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu"><a href="browse.html">Browse</a></div>
</nav>

<div class="main-content">
  <div style="background:var(--sand);padding:.9rem 1.5rem;border-bottom:1px solid var(--border);">
    <div style="max-width:1040px;margin:0 auto;font-size:13px;color:#888;">
      <a href="index.html" style="color:var(--moss);">Home</a> ›
      <a href="browse.html" style="color:var(--moss);">Browse Tasks</a> ›
      <span id="breadTitle">Task</span>
    </div>
  </div>

  <div class="task-detail-body">
    <main>
      <div class="task-main-card" id="taskCard">
        <div style="text-align:center;padding:3rem;color:#888;">Loading task...</div>
      </div>

      <!-- APPLICANTS (visible to poster) -->
      <div class="task-main-card" id="applicantsSection" style="margin-top:1.5rem;display:none;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:1rem;">Applicants <span id="applicantCount" style="background:var(--mist);color:var(--moss);font-size:12px;padding:2px 8px;border-radius:10px;font-weight:700;"></span></h3>
        <div id="applicantsList"></div>
      </div>
    </main>

    <aside id="taskSidebar"></aside>
  </div>
</div>

<!-- APPLY MODAL -->
<div class="modal-overlay" id="applyModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Apply for This Task</div>
      <button class="modal-close" onclick="document.getElementById('applyModal').classList.remove('open')">×</button>
    </div>
    <div id="applyModalContent"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/main.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const taskId = parseInt(params.get('id'))||1;
const task = SQ.tasks.find(t=>t.id===taskId)||SQ.tasks[0];
const user = store.get('sq_user');

document.getElementById('breadTitle').textContent = task.title.slice(0,45)+'...';
document.title = task.title.slice(0,50)+' — SciQuest';

const days = Math.ceil((new Date(task.deadline)-new Date())/86400000);

document.getElementById('taskCard').innerHTML = `
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;">
    <span class="task-type-badge ${SQ.badgeClass[task.type]}">${SQ.taskTypes[task.type]}</span>
    ${task.urgent?'<span class="urgent-tag">Urgent</span>':''}
    <span class="tag tag-success">Open — Accepting Applications</span>
  </div>
  <h1 style="font-family:var(--font-display);font-size:1.6rem;color:var(--ink);line-height:1.3;margin-bottom:.9rem;">${task.title}</h1>
  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.5rem;">
    <span style="display:flex;align-items:center;gap:5px;font-size:13px;color:#555;background:var(--sand);padding:5px 13px;border-radius:20px;">📚 ${task.field}</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:13px;color:#555;background:var(--sand);padding:5px 13px;border-radius:20px;">🏫 ${task.university}</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:13px;color:#555;background:var(--sand);padding:5px 13px;border-radius:20px;">⏳ ${days>0?days+' days left':'Due today'}</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:13px;color:#555;background:var(--sand);padding:5px 13px;border-radius:20px;">💬 ${task.responses} applied</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:13px;color:#555;background:var(--sand);padding:5px 13px;border-radius:20px;">📅 Posted ${fmtDate(task.posted)}</span>
  </div>
  <hr style="border:none;border-top:1px solid var(--border);margin:1.2rem 0;">
  <h3 style="font-size:15px;font-weight:700;margin-bottom:.8rem;">Full Description</h3>
  <div style="font-size:15px;color:#444;line-height:1.9;">${task.desc}</div>
  <hr style="border:none;border-top:1px solid var(--border);margin:1.2rem 0;">
  <h3 style="font-size:15px;font-weight:700;margin-bottom:.8rem;">Requirements</h3>
  <ul class="task-req-list">
    <li>Must be a verified SciQuest student in a relevant field</li>
    <li>Communicate in English or Urdu — your choice</li>
    <li>Deliver before deadline: <strong>${fmtDate(task.deadline)}</strong></li>
    <li>Original, well-referenced work only</li>
    <li>Share progress updates via the built-in chat</li>
  </ul>
  <hr style="border:none;border-top:1px solid var(--border);margin:1.2rem 0;">
  <h3 style="font-size:15px;font-weight:700;margin-bottom:.8rem;">💳 Payment Process</h3>
  <div style="background:var(--mist);border-radius:var(--radius-md);padding:1.1rem;font-size:14px;color:#444;line-height:1.8;">
    <div style="margin-bottom:.4rem;"><strong>Step 1:</strong> Poster deposits ₨${task.pay.toLocaleString()} into SciQuest escrow (admin-approved)</div>
    <div style="margin-bottom:.4rem;"><strong>Step 2:</strong> You complete the task and submit via chat</div>
    <div style="margin-bottom:.4rem;"><strong>Step 3:</strong> Poster reviews and approves your work</div>
    <div><strong>Step 4:</strong> Admin releases ₨${task.pay.toLocaleString()} to your wallet instantly</div>
  </div>
`;

document.getElementById('taskSidebar').innerHTML = `
  <div class="sidebar-widget">
    <div style="text-align:center;padding:.5rem 0 1.2rem;">
      <div style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem;">Task Budget</div>
      <div style="font-family:var(--font-display);font-size:3rem;color:var(--moss);">₨${task.pay.toLocaleString()}</div>
      <div style="font-size:12px;color:#888;margin-top:2px;">100% yours · zero platform fee</div>
    </div>
    <button class="btn-primary w-full" style="font-size:15px;padding:13px;" onclick="openApplyModal()">Apply for This Task →</button>
    <button class="btn-secondary w-full" style="margin-top:.7rem;" onclick="openChat()">💬 Chat with Poster</button>
    <div style="font-size:12px;color:#888;text-align:center;margin-top:.6rem;">${task.responses} people have applied</div>
  </div>

  <div class="sidebar-widget">
    <h4>👤 Posted By</h4>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;">
      <div class="avatar avatar-md" style="background:${task.poster.color}">${task.poster.initials}</div>
      <div>
        <div style="font-weight:700;font-size:15px;">${task.poster.name}</div>
        <div style="font-size:13px;color:#888;">${task.university}</div>
        <div style="color:#f59e0b;font-size:13px;margin-top:2px;">★★★★★ <span style="color:#888;font-size:11px;">(verified)</span></div>
      </div>
    </div>
    <button class="btn-secondary w-full" onclick="openChat()">💬 Send Message</button>
  </div>

  <div class="sidebar-widget">
    <h4>📊 Task Info</h4>
    <div style="display:flex;flex-direction:column;gap:.5rem;">
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);"><span style="color:#888;">Type</span><strong>${SQ.taskTypes[task.type]}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);"><span style="color:#888;">Field</span><strong>${task.field}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);"><span style="color:#888;">Deadline</span><strong>${fmtDate(task.deadline)}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);"><span style="color:#888;">Days Left</span><strong style="color:${days<3?'#dc2626':'var(--moss)'};">${days}</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;"><span style="color:#888;">Payment</span><strong style="color:#16a34a;">Escrow Protected</strong></div>
    </div>
  </div>

  <div class="sidebar-widget">
    <h4>🔍 Similar Tasks</h4>
    ${SQ.tasks.filter(t=>t.field===task.field&&t.id!==task.id).slice(0,3).map(t=>`
      <div onclick="window.location='task-detail.html?id=${t.id}'" style="padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:padding .15s;" onmouseover="this.style.paddingLeft='8px'" onmouseout="this.style.paddingLeft='0'">
        <div style="font-size:13px;font-weight:600;">${t.title.slice(0,48)}...</div>
        <div style="font-size:12px;color:#888;margin-top:2px;display:flex;justify-content:space-between;"><span>${t.field}</span><span style="color:var(--moss);font-weight:700;">₨${t.pay.toLocaleString()}</span></div>
      </div>`).join('')}
  </div>`;

// Show applicants if poster
if (user && (user.name === task.poster.name || user.role==='admin')) {
  document.getElementById('applicantsSection').style.display='block';
  const sampleApplicants = [
    {name:'Saeed Ullah', initials:'SU', color:'#1a4a2e', field:'Parasitology', rating:5.0, tasks:31, isFounder:true},
    {name:'Sara Zaidi', initials:'SZ', color:'#9d174d', field:'Biochemistry', rating:4.9, tasks:15},
    {name:'Bilal Mahmood', initials:'BM', color:'#4f46e5', field:'Microbiology', rating:4.8, tasks:19},
  ];
  document.getElementById('applicantCount').textContent = task.responses;
  document.getElementById('applicantsList').innerHTML = sampleApplicants.map(a=>`
    <div class="applicant-card" onclick="showToast('Opening chat with '+a.name+'...');setTimeout(()=>window.location.href='messages.html',800);">
      <div class="avatar avatar-sm" style="background:${a.color}">${a.initials}</div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:700;">${a.name} ${a.isFounder?'<span style="font-size:10px;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:8px;">Founder</span>':''}</div>
        <div style="font-size:12px;color:#888;">${a.field} · ${a.tasks} tasks done</div>
      </div>
      <div style="text-align:right;"><div class="stars">★ ${a.rating}</div><div style="font-size:11px;color:#aaa;margin-top:2px;">Chat →</div></div>
    </div>`).join('');
}

function openApplyModal() {
  if (!user) { showToast('Sign in to apply.','warning'); setTimeout(()=>window.location.href='login.html',900); return; }
  document.getElementById('applyModalContent').innerHTML = `
    <div style="background:var(--sand);border-radius:var(--radius-md);padding:1rem;margin-bottom:1.2rem;">
      <div style="font-size:14px;font-weight:700;">${task.title.slice(0,60)}...</div>
      <div style="font-size:13px;color:#888;margin-top:4px;">${task.field} · ₨${task.pay.toLocaleString()} · Due in ${days} days</div>
    </div>
    <div class="form-group">
      <label>Your Proposal / Cover Note</label>
      <textarea id="proposalText" rows="4" style="width:100%;padding:11px 14px;border:1.5px solid var(--border-md);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:14px;outline:none;resize:vertical;" placeholder="Introduce yourself, explain your relevant experience, and briefly describe your approach to this task..."></textarea>
    </div>
    <div class="form-group">
      <label>Estimated Delivery Time</label>
      <select style="width:100%;padding:11px 14px;border:1.5px solid var(--border-md);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:14px;outline:none;background:white;">
        <option>24 hours</option><option>2 days</option><option selected>3 days</option><option>5 days</option><option>1 week</option>
      </select>
    </div>
    <div style="background:var(--mist);border-radius:var(--radius-sm);padding:.8rem 1rem;margin-bottom:1.2rem;font-size:13px;color:var(--moss);">
      🔒 After applying, a chat with the poster will open. Payment (₨${task.pay.toLocaleString()}) is held in escrow until you deliver.
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn-secondary" style="flex:1;" onclick="document.getElementById('applyModal').classList.remove('open')">Cancel</button>
      <button class="btn-primary" style="flex:1;" onclick="confirmApply()">Submit Application →</button>
    </div>`;
  document.getElementById('applyModal').classList.add('open');
}

function openChat() {
  if (!user) { showToast('Sign in to chat.','warning'); setTimeout(()=>window.location.href='login.html',900); return; }
  const convos = JSON.parse(localStorage.getItem('sq_convos')||'[]');
  const existing = convos.find(c=>c.taskId===task.id);
  if (existing) { window.location.href='messages.html?convo='+existing.id; return; }
  const newConvo = {
    id:'c'+Date.now(), taskId:task.id, taskTitle:task.title, taskPay:task.pay,
    other:{name:task.poster.name, initials:task.poster.initials, color:task.poster.color, role:'poster'},
    unread:0, lastTime:'Just now',
    messages:[{id:'sys0', system:true, text:'Chat started for: '+task.title, time:new Date().toLocaleString('en-PK')}]
  };
  convos.unshift(newConvo);
  localStorage.setItem('sq_convos', JSON.stringify(convos));
  window.location.href='messages.html?convo='+newConvo.id;
}

function confirmApply() {
  const proposal = document.getElementById('proposalText').value.trim();
  if (!proposal) { showToast('Please write a proposal.','warning'); return; }
  document.getElementById('applyModal').classList.remove('open');
  showToast('Application submitted! Opening chat with poster...');
  store.addNotification({type:'task',icon:'✅',bg:'#f0fdf4', title:'Application submitted', body:'You applied for: '+task.title.slice(0,50)+'...'});
  setTimeout(()=>openChat(), 1200);
}

document.getElementById('applyModal').addEventListener('click',e=>{if(e.target.id==='applyModal')e.target.classList.remove('open');});
</script>
</body>
</html>
